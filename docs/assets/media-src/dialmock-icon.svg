<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DialMock bee icon</title>
  <desc id="desc">A geometric bee icon with a dial gauge and .NET label inside the abdomen.</desc>

  <rect width="512" height="512" fill="none"/>

  <!-- Wings -->
  <ellipse cx="155" cy="195" rx="68" ry="92" transform="rotate(-34 155 195)" fill="#DDEAFE"/>
  <ellipse cx="357" cy="195" rx="68" ry="92" transform="rotate(34 357 195)" fill="#DDEAFE"/>

  <!-- Antennae -->
  <path d="M228 92 C210 58, 188 52, 170 68" fill="none" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>
  <path d="M284 92 C302 58, 324 52, 342 68" fill="none" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>
  <circle cx="165" cy="70" r="10" fill="#1F2937"/>
  <circle cx="347" cy="70" r="10" fill="#1F2937"/>

  <!-- Head -->
  <circle cx="256" cy="136" r="42" fill="#1F2937"/>

  <!-- Thorax -->
  <ellipse cx="256" cy="220" rx="62" ry="54" fill="#F59E0B"/>

  <!-- Abdomen outer -->
  <path
    d="M256 208
       C332 208, 386 270, 386 344
       C386 420, 330 470, 256 470
       C182 470, 126 420, 126 344
       C126 270, 180 208, 256 208 Z"
    fill="#1F2937"/>

  <!-- Abdomen inner -->
  <path
    d="M256 232
       C318 232, 362 282, 362 344
       C362 408, 316 446, 256 446
       C196 446, 150 408, 150 344
       C150 282, 194 232, 256 232 Z"
    fill="#F59E0B"/>

  <!-- Top and bottom stripes -->
  <rect x="166" y="248" width="180" height="14" rx="7" fill="#1F2937"/>
  <rect x="166" y="406" width="180" height="14" rx="7" fill="#1F2937"/>

  <!-- Dial window -->
  <circle cx="256" cy="334" r="74" fill="#F8FAFC" stroke="#1F2937" stroke-width="8"/>

  <!-- Dial outer ring -->
  <circle cx="256" cy="334" r="58" fill="none" stroke="#1F2937" stroke-width="6"/>

  <!-- Tick marks -->
  <line x1="256" y1="278" x2="256" y2="290" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <line x1="228" y1="285" x2="234" y2="296" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <line x1="205" y1="305" x2="216" y2="311" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <line x1="198" y1="334" x2="210" y2="334" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <line x1="314" y1="334" x2="302" y2="334" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <line x1="307" y1="305" x2="296" y2="311" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  <line x1="284" y1="285" x2="278" y2="296" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>

  <!-- Needle -->
  <line x1="256" y1="334" x2="296" y2="306" stroke="#7C3AED" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="334" r="10" fill="#1F2937"/>

  <!-- .NET label -->
  <rect x="214" y="360" width="84" height="26" rx="8" fill="#7C3AED"/>
  <text x="256" y="378"
        font-family="Arial, sans-serif"
        font-size="16"
        font-weight="700"
        text-anchor="middle"
        fill="#FFFFFF">.NET</text>

  <!-- Stinger -->
  <path d="M256 470 L276 500 L236 500 Z" fill="#1F2937"/>
</svg>